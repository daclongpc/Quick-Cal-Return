<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Cal Return</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
    <h1>Quick Cal Return</h1>

    <!-- Row 1 -->
    <div class="row">
        <div class="input-group">
            <label>Total ($)</label>
            <input type="number" id="total">
        </div>
    </div>

    <!-- Row 2 -->
    <div class="row space-top">
        <div class="input-group">
            <label>Invest / Max Loss ($)</label>
            <input type="number" id="invest">
        </div>

        <div class="input-group">
            <label>Max Profit ($)</label>
            <input type="number" id="maxProfit">
            <div class="sub-percent">
                <span id="profitPercent">0%</span>
            </div>
        </div>
    </div>

    <!-- Row 3 -->
    <div class="row space-top">
        <div class="input-group">
            <label>Insurance ($)</label>
            <div class="output" id="insurance">0</div>
            <div class="sub-percent" id="insurancePercent">0%</div>
        </div>

        <div class="input-group">
            <label>Break-even (%)</label>
            <div class="output" id="breakEven">0%</div>
        </div>
    </div>

    <!-- Final Return -->
    <div class="final-return">
    <span id="finalReturn">$0 (0% return)</span>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
